<svg width="680" height="780" viewBox="0 0 680 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="pg" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
    <radialGradient id="rg1" cx="8%" cy="8%" r="42%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff7a59" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff7a59" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg2" cx="85%" cy="12%" r="37%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rg3" cx="45%" cy="85%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1327" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#060f1b" stop-opacity="1"/>
    </linearGradient>
    <style>
      text { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .hero { font-family: 'Barlow Condensed', Impact, sans-serif; font-weight: 800; }
    </style>
  </defs>

  <!-- Everything clipped to rounded rect -->
  <g>
    <!-- Base bg -->
    <rect width="680" height="780" fill="url(#lg1)"/>
    <!-- Ambient gradients -->
    <rect width="680" height="780" fill="url(#rg1)"/>
    <rect width="680" height="780" fill="url(#rg2)"/>
    <rect width="680" height="780" fill="url(#rg3)"/>
    <!-- Grid -->
    <rect width="680" height="780" fill="url(#pg)"/>
  </g>

  <!-- Border on top (outside clip so it's crisp) -->
  <rect width="680" height="780" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- ── Top row ── -->
  <rect x="28" y="28" rx="14" width="196" height="28" fill="rgba(255,122,89,0.08)" stroke="rgba(255,122,89,0.4)" stroke-width="1"/>
  <text x="126" y="47" text-anchor="middle" font-size="11" fill="#ff7a59" letter-spacing="2">9P TRANSPORT TUNING</text>
  <text x="652" y="47" text-anchor="end" font-size="11" fill="#8a9bb5" letter-spacing="1">WSL · virtio · trans=fd</text>

  <!-- ── Hero text ── -->
  <text x="340" y="158" text-anchor="middle" class="hero" font-size="90" fill="#e8edf5" letter-spacing="-1">Nearly <tspan fill="#ff7a59">2×</tspan></text>
  <text x="340" y="240" text-anchor="middle" class="hero" font-size="90" fill="#e8edf5" letter-spacing="-1">faster</text>
  <text x="340" y="322" text-anchor="middle" class="hero" font-size="90" fill="#e8edf5" letter-spacing="-1">across the</text>
  <text x="340" y="404" text-anchor="middle" class="hero" font-size="90" fill="#e8edf5" letter-spacing="-1">boundary</text>

  <!-- ── Subtitle ── -->
  <text x="340" y="438" text-anchor="middle" font-size="12" fill="#8a9bb5" letter-spacing="1">virtio-9p · msize · PAGE_SIZE limits · vsock</text>

  <!-- ── Divider 1 ── -->
  <line x1="28" y1="460" x2="652" y2="460" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- ── Bar 1: WSL → C:\ ── -->
  <text x="652" y="472" text-anchor="end" font-size="11" fill="#5a6a82">124 MB/s</text>
  <line x1="590" y1="469" x2="652" y2="469" stroke="#5a6a82" stroke-width="1"/>
  <text x="28" y="500" font-size="12" fill="#e8edf5">WSL → C:\</text>
  <text x="28" y="516" font-size="11" fill="#8a9bb5">guest to host</text>
  <rect x="150" y="503" width="360" height="5" fill="rgba(255,255,255,0.07)"/>
  <rect x="150" y="503" width="191" height="5" fill="#ff7a59"/>
  <circle cx="341" cy="505" r="6" fill="#ff7a59"/>
  <text x="652" y="500" text-anchor="end" class="hero" font-size="24" fill="#ff7a59">238 MB/s</text>
  <text x="652" y="516" text-anchor="end" font-size="11" fill="#ff7a59">+92%</text>

  <!-- ── Bar 2: C:\ → WSL ── -->
  <text x="652" y="548" text-anchor="end" font-size="11" fill="#5a6a82">185 MB/s</text>
  <line x1="590" y1="545" x2="652" y2="545" stroke="#5a6a82" stroke-width="1"/>
  <text x="28" y="574" font-size="12" fill="#e8edf5">C:\ → WSL</text>
  <text x="28" y="590" font-size="11" fill="#8a9bb5">host to guest</text>
  <rect x="150" y="577" width="360" height="5" fill="rgba(255,255,255,0.07)"/>
  <rect x="150" y="577" width="288" height="5" fill="#60a5fa"/>
  <circle cx="438" cy="579" r="6" fill="#60a5fa"/>
  <text x="652" y="574" text-anchor="end" class="hero" font-size="24" fill="#60a5fa">365 MB/s</text>
  <text x="652" y="590" text-anchor="end" font-size="11" fill="#60a5fa">+97%</text>

  <!-- ── Divider 2 ── -->
  <line x1="28" y1="610" x2="652" y2="610" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- ── Config lines ── -->
  <text x="28" y="638" font-size="12" fill="#ff7a59">MaximumRequestBufferSize<tspan fill="#c8d4e0"> 256 KiB → 1 MiB</tspan></text>
  <text x="28" y="660" font-size="12" fill="#ff7a59">msize<tspan fill="#c8d4e0"> (trans=fd) 64 KiB → 256 KiB</tspan></text>
  <text x="28" y="682" font-size="12" fill="#ff7a59">virtio cap<tspan fill="#c8d4e0"> PAGE_SIZE × (VIRTQUEUE_NUM - 3) = 512,000 B</tspan></text>

  <!-- ── 2× Badge ── -->
  <rect x="500" y="618" width="152" height="110" rx="14" fill="rgba(255,122,89,0.06)" stroke="rgba(255,122,89,0.3)" stroke-width="1"/>
  <text x="576" y="672" text-anchor="middle" class="hero" font-size="38" fill="#ff7a59">2×</text>
  <text x="576" y="692" text-anchor="middle" font-size="10" fill="#8a9bb5" letter-spacing="2">APPROX</text>
  <text x="576" y="708" text-anchor="middle" font-size="10" fill="#8a9bb5" letter-spacing="2">THROUGHPUT GAIN</text>
</svg>